<div class="shop-sidebar-root">
  <div id="hover-zone" class="shop-sidebar-trigger"></div>
  <nav class="sidebar-wrapper" aria-label="Shop categories">
    <span id="sidebar-tab">CATEGORIES</span>
    {% include 'partials/_shop_sidebar_categories.html' %}
  </nav>
</div>

<script>
(function () {
  const root = document.querySelector('.shop-sidebar-root');
  if (!root) return;

  const sidebar = root.querySelector('.sidebar-wrapper');
  const hoverZone = root.querySelector('#hover-zone');
  if (!sidebar || !hoverZone) return;

  const open = () => {
    sidebar.style.left = '0';
    document.body.classList.add('sidebar-open');
  };

  const close = () => {
    sidebar.style.left = '-280px';
    document.body.classList.remove('sidebar-open');
  };

  /* Same interaction as the legacy burger menu */
  hoverZone.addEventListener('mouseenter', open);
  sidebar.addEventListener('mouseenter', open);
  sidebar.addEventListener('mouseleave', close);
})();
</script>
